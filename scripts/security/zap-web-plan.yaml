---
# ZAP Automation Framework Plan: GlycemicGPT Web Frontend Security Scan
#
# Scans the Next.js web frontend for security issues. The frontend is a React
# SPA, so standard spidering discovers almost nothing. This plan uses:
#   1. Requestor to pre-seed known page URLs (from apps/web/src/app/**/page.tsx)
#   2. AJAX Spider with headless Firefox to render JavaScript and discover routes
#   3. Passive + Active scanning on all discovered pages
#
# Auth cookies are pre-computed by CI and injected via replacer (same pattern
# as the API scan). The CSRF injector script is reused.
#
# Environment variables (must be passed to the ZAP container):
#   ZAP_SESSION  - glycemicgpt_session cookie value
#   ZAP_CSRF     - csrf_token cookie value
#
# IMPORTANT: ZAP does NOT expand ${VAR} in YAML. CI must run envsubst first:
#   envsubst '${ZAP_SESSION} ${ZAP_CSRF}' < zap-web-plan.yaml > zap-web-plan.resolved.yaml
#   zap.sh -cmd -autorun /zap/wrk/zap-web-plan.resolved.yaml

env:
  contexts:
    - name: "glycemicgpt-web"
      urls:
        - "http://localhost:3001"
      includePaths:
        - "http://localhost:3001.*"
      excludePaths:
        # Static assets (nothing to scan)
        - "http://localhost:3001/_next/.*"
        - "http://localhost:3001/__next.*"
        # API calls are covered by the API scan plan
        - "http://localhost:3001/api/.*"
  parameters:
    failOnError: false
    failOnWarning: false
    progressToStdout: true

jobs:
  # Load the HttpSender script that copies csrf_token cookie to X-CSRF-Token header
  - type: script
    parameters:
      action: "add"
      type: "httpsender"
      engine: "Graal.js"
      name: "csrf-injector"
      file: "/zap/wrk/zap-csrf-injector.js"

  # Inject pre-computed auth cookies on every request
  - type: replacer
    parameters:
      deleteAllRules: true
    rules:
      - description: "Inject authenticated session cookies"
        matchType: "req_header"
        matchString: "Cookie"
        replacementString: "glycemicgpt_session=${ZAP_SESSION}; csrf_token=${ZAP_CSRF}"
        matchRegex: false
        tokenProcessing: false
        initiators: []

  # Pre-seed ZAP with all known page URLs so passive scan has full coverage
  # even if the AJAX spider misses some routes. Derived from:
  #   apps/web/src/app/**/page.tsx
  - type: requestor
    parameters:
      user: ""
    requests:
      # Public pages
      - url: "http://localhost:3001/"
        method: "GET"
      - url: "http://localhost:3001/login"
        method: "GET"
      - url: "http://localhost:3001/register"
        method: "GET"
      # Dashboard (authenticated)
      - url: "http://localhost:3001/dashboard"
        method: "GET"
      - url: "http://localhost:3001/dashboard/ai-chat"
        method: "GET"
      - url: "http://localhost:3001/dashboard/alerts"
        method: "GET"
      - url: "http://localhost:3001/dashboard/briefs"
        method: "GET"
      - url: "http://localhost:3001/dashboard/caregiver"
        method: "GET"
      - url: "http://localhost:3001/dashboard/knowledge-base"
        method: "GET"
      - url: "http://localhost:3001/dashboard/reports/clinical"
        method: "GET"
      # Settings pages
      - url: "http://localhost:3001/dashboard/settings"
        method: "GET"
      - url: "http://localhost:3001/dashboard/settings/glucose-range"
        method: "GET"
      - url: "http://localhost:3001/dashboard/settings/insulin"
        method: "GET"
      - url: "http://localhost:3001/dashboard/settings/alerts"
        method: "GET"
      - url: "http://localhost:3001/dashboard/settings/ai-provider"
        method: "GET"
      - url: "http://localhost:3001/dashboard/settings/research-sources"
        method: "GET"
      - url: "http://localhost:3001/dashboard/settings/data"
        method: "GET"
      - url: "http://localhost:3001/dashboard/settings/profile"
        method: "GET"
      - url: "http://localhost:3001/dashboard/settings/caregivers"
        method: "GET"
      - url: "http://localhost:3001/dashboard/settings/communications"
        method: "GET"
      - url: "http://localhost:3001/dashboard/settings/emergency-contacts"
        method: "GET"
      - url: "http://localhost:3001/dashboard/settings/safety-limits"
        method: "GET"
      - url: "http://localhost:3001/dashboard/settings/integrations"
        method: "GET"
      - url: "http://localhost:3001/dashboard/settings/telegram"
        method: "GET"
      - url: "http://localhost:3001/dashboard/settings/brief-delivery"
        method: "GET"

  # Standard spider: follows links from the pre-seeded pages above.
  # Note: AJAX Spider (headless Firefox) was considered but requires ~2.5GB RAM
  # which risks OOM on standard GitHub runners (7GB total). The requestor
  # pre-seeds all 25+ known routes, so the standard spider provides sufficient
  # additional discovery by following links from those pages.
  - type: spider
    parameters:
      context: "glycemicgpt-web"
      url: "http://localhost:3001/"
      maxDuration: 3
      maxDepth: 5

  # Passive scan: security headers, cookie flags, CSP, information disclosure
  - type: passiveScan-config
    parameters:
      maxAlertsPerRule: 10
      scanOnlyInScope: true

  - type: passiveScan-wait
    parameters:
      maxDuration: 3

  # Active scan: injection testing through the web proxy path
  - type: activeScan
    parameters:
      context: "glycemicgpt-web"
      maxScanDurationInMins: 10
      maxRuleDurationInMins: 2
      addQueryParam: false
      handleAntiCSRFTokens: true
      scanHeadersAllRequests: false

  # Generate JSON report (distinct filename from API report)
  - type: report
    parameters:
      template: "traditional-json"
      reportDir: "/zap/wrk/results"
      reportFile: "zap-web-report"
      reportTitle: "GlycemicGPT Web Frontend Security Scan"
    risks:
      - high
      - medium
      - low
      - info
    confidences:
      - high
      - medium
      - low
      - confirmed

  # Fail CI on Medium+ severity findings, warn on Low
  - type: exitStatus
    parameters:
      errorLevel: "Medium"
      warnLevel: "Low"
    alwaysRun: true
