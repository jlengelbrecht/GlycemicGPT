name: Security Full Suite

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Queue runs instead of cancelling. At most 1 running + 1 queued at any time.
  # When multiple PRs merge rapidly:
  #   - PR A merges -> run starts (~40 min)
  #   - PR B merges -> queued (waits for A)
  #   - PR C merges -> replaces B in queue (GitHub keeps only 1 pending)
  #   - A finishes -> C starts (tests latest HEAD, which includes B+C)
  # Every merge is eventually covered. No runner clobbering.
  group: security-full-suite-${{ github.ref }}

jobs:
  # ==========================================================================
  # Job 1: SAST -- Semgrep on entire codebase (no Docker needed)
  # ==========================================================================
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep (all languages)
        id: semgrep
        run: |
          EXIT=0
          semgrep scan \
            --config p/python \
            --config p/typescript \
            --config p/kotlin \
            --config p/java \
            --config p/owasp-top-ten \
            --config p/secrets \
            --exclude 'node_modules' \
            --exclude '.venv' \
            --exclude '.gradle' \
            --exclude '*.min.js' \
            --exclude 'apps/api/.venv' \
            --exclude 'Dockerfile*' \
            --json --output semgrep-results.json \
            apps/api/ apps/web/ sidecar/ apps/mobile/ plugins/ scripts/security/ || EXIT=$?
          echo "Semgrep exit code: $EXIT"

      - name: Upload SAST results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-results
          path: semgrep-results.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Evaluate SAST result
        if: always()
        env:
          semgrep_python_exit: "0"
          semgrep_typescript_exit: "0"
          semgrep_kotlin_exit: "0"
        run: |
          # Full suite produces a single combined JSON. Symlink it so the
          # evaluator can check each "language" file.
          for lang in python typescript kotlin; do
            ln -sf semgrep-results.json "semgrep-${lang}.json"
          done
          python scripts/security/evaluate-sast.py

  # ==========================================================================
  # Job 2: DAST -- Full Docker stack + all security tests
  # ==========================================================================
  dast:
    name: DAST & Penetration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install test dependencies
        run: pip install -r scripts/security/requirements.txt

      - name: Install nuclei
        run: |
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@v3.3.7
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Build & start Docker test stack
        env:
          COMPOSE_PROJECT_NAME: glycemicgpt-test
          DOCKER_BUILDKIT: 1
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml up --build -d

      - name: Wait for services to be healthy
        env:
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: |
          API_HEALTHY=false
          echo "Waiting for API health..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
              echo "API healthy after ${i}s"
              API_HEALTHY=true
              break
            fi
            sleep 1
          done
          if [ "$API_HEALTHY" != "true" ]; then
            echo "FATAL: API not healthy after 90s"
            docker compose -f docker-compose.yml -f docker-compose.test.yml logs api --tail=50
            exit 1
          fi

          WEB_HEALTHY=false
          echo "Waiting for Web health..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:3001 > /dev/null 2>&1; then
              echo "Web healthy after ${i}s"
              WEB_HEALTHY=true
              break
            fi
            sleep 1
          done
          if [ "$WEB_HEALTHY" != "true" ]; then
            echo "FATAL: Web not healthy after 90s"
            docker compose -f docker-compose.yml -f docker-compose.test.yml logs web --tail=50
            exit 1
          fi

      # ---- Custom Security Tests (sequential with Redis flushes) ----

      - name: Run auth flow tests
        id: auth-tests
        env:
          API_URL: http://localhost:8001
          WEB_URL: http://localhost:3001
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: |
          TEST_SECRET_KEY=$(docker compose -f docker-compose.yml -f docker-compose.test.yml exec -T api printenv SECRET_KEY) || {
            echo "FATAL: Could not read SECRET_KEY from API container"
            exit 1
          }
          export TEST_SECRET_KEY
          python scripts/security/test-auth-flows.py

      - name: Reset rate limits
        env:
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml exec -T redis redis-cli FLUSHDB || true

      - name: Run data isolation tests (IDOR)
        id: idor-tests
        env:
          API_URL: http://localhost:8001
          TEST_PASSWORD: ${{ secrets.SECURITY_TEST_PASSWORD }}
        run: python scripts/security/test-data-isolation.py

      - name: Reset rate limits
        env:
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml exec -T redis redis-cli FLUSHDB || true

      - name: Run research security tests (SSRF, rate limiting)
        id: research-tests
        env:
          API_URL: http://localhost:8001
          TEST_PASSWORD: ${{ secrets.SECURITY_TEST_PASSWORD }}
        run: python scripts/security/test-research-security.py

      - name: Reset rate limits
        env:
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml exec -T redis redis-cli FLUSHDB || true

      - name: Run API fuzzer
        id: fuzzer
        env:
          API_URL: http://localhost:8001
          TEST_PASSWORD: ${{ secrets.SECURITY_TEST_PASSWORD }}
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: python scripts/security/fuzz-api.py

      # ---- Nuclei DAST ----

      - name: Reset rate limits
        env:
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml exec -T redis redis-cli FLUSHDB || true

      - name: Run nuclei DAST
        id: nuclei
        env:
          API_URL: http://localhost:8001
          WEB_URL: http://localhost:3001
        run: ./scripts/security/run-dast.sh

      # ---- ZAP Scans (sequential to stay within 7GB runner RAM) ----

      - name: Reset rate limits
        env:
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml exec -T redis redis-cli FLUSHDB || true

      - name: Setup ZAP authenticated session
        id: zap-setup
        env:
          API_URL: http://localhost:8001
          TEST_PASSWORD: ${{ secrets.SECURITY_TEST_PASSWORD }}
        run: |
          ZAP_EMAIL="zap_$(date +%s)_${RANDOM}@example.com"

          curl -sf -X POST "$API_URL/api/auth/register" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$ZAP_EMAIL\",\"password\":\"$TEST_PASSWORD\"}" > /dev/null

          COOKIE_JAR=$(mktemp)
          curl -sf -c "$COOKIE_JAR" -X POST "$API_URL/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$ZAP_EMAIL\",\"password\":\"$TEST_PASSWORD\"}" > /dev/null

          SESSION=$(awk '/glycemicgpt_session/ {print $NF}' "$COOKIE_JAR")
          CSRF=$(awk '/csrf_token/ {print $NF}' "$COOKIE_JAR")

          if [ -z "$SESSION" ] || [ -z "$CSRF" ]; then
            echo "FATAL: ZAP auth bootstrap failed -- no session cookies"
            exit 1
          fi

          curl -sf -X POST "$API_URL/api/disclaimer/acknowledge" \
            -H "X-CSRF-Token: $CSRF" \
            -b "glycemicgpt_session=$SESSION; csrf_token=$CSRF" > /dev/null || true

          echo "ZAP_SESSION=$SESSION" >> "$GITHUB_ENV"
          echo "ZAP_CSRF=$CSRF" >> "$GITHUB_ENV"
          rm -f "$COOKIE_JAR"
          echo "ZAP auth session established"

          # Pre-create results dir writable for ZAP containers (run as UID 1000)
          mkdir -p scripts/security/results
          chmod 777 scripts/security/ scripts/security/results/

      - name: Run ZAP API active scan
        id: zap-api
        run: |
          ZAP_EXIT=0
          docker run --rm --network="host" \
            -v "$(pwd)/scripts/security:/zap/wrk/:rw" \
            -e "ZAP_SESSION=$ZAP_SESSION" \
            -e "ZAP_CSRF=$ZAP_CSRF" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd -autorun /zap/wrk/zap-api-plan.yaml || ZAP_EXIT=$?
          echo "ZAP API exit code: $ZAP_EXIT"
          if [ -f scripts/security/results/zap-report.json ]; then
            HIGHS=$(python3 -c "import json; d=json.load(open('scripts/security/results/zap-report.json')); print(sum(1 for a in d.get('site',[{}])[0].get('alerts',[]) if a.get('riskcode','0') in ('2','3')))" 2>/dev/null || echo "0")
            if [ "$HIGHS" -gt 0 ]; then
              echo "ZAP API found $HIGHS Medium/High severity alerts"
              exit 1
            fi
            echo "ZAP API report clean"
          else
            echo "No ZAP API report -- OpenAPI parsing issues (non-blocking)"
          fi

      - name: Run ZAP Web scan
        id: zap-web
        run: |
          ZAP_EXIT=0
          docker run --rm --network="host" \
            -v "$(pwd)/scripts/security:/zap/wrk/:rw" \
            -e "ZAP_SESSION=$ZAP_SESSION" \
            -e "ZAP_CSRF=$ZAP_CSRF" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd -autorun /zap/wrk/zap-web-plan.yaml || ZAP_EXIT=$?
          echo "ZAP Web exit code: $ZAP_EXIT"
          if [ -f scripts/security/results/zap-web-report.json ]; then
            HIGHS=$(python3 -c "import json; d=json.load(open('scripts/security/results/zap-web-report.json')); print(sum(1 for a in d.get('site',[{}])[0].get('alerts',[]) if a.get('riskcode','0') in ('2','3')))" 2>/dev/null || echo "0")
            if [ "$HIGHS" -gt 0 ]; then
              echo "ZAP Web found $HIGHS Medium/High severity alerts"
              exit 1
            fi
            echo "ZAP Web report clean"
          else
            echo "No ZAP Web report -- parsing issues (non-blocking)"
          fi

      # ---- Cleanup ----

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-results
          path: scripts/security/results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Show container logs on failure
        if: failure()
        env:
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: |
          echo "=== API Logs ==="
          docker compose -f docker-compose.yml -f docker-compose.test.yml logs api --tail=100
          echo ""
          echo "=== Web Logs ==="
          docker compose -f docker-compose.yml -f docker-compose.test.yml logs web --tail=50

      - name: Tear down Docker stack
        if: always()
        env:
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml down -v --remove-orphans

  # ==========================================================================
  # Job 3: Summary -- gate job (badge target)
  # ==========================================================================
  summary:
    name: Security Full Suite
    runs-on: ubuntu-latest
    needs: [sast, dast]
    if: always()
    steps:
      - name: Evaluate results
        env:
          SAST_RESULT: ${{ needs.sast.result }}
          DAST_RESULT: ${{ needs.dast.result }}
        run: |
          if [ "$SAST_RESULT" = "success" ] && [ "$DAST_RESULT" = "success" ]; then
            echo "All security tests passed"
            exit 0
          fi
          echo "Security tests failed (SAST: $SAST_RESULT, DAST: $DAST_RESULT)"
          exit 1
