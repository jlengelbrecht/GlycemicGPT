name: Security Full Suite

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  # cancel-in-progress: false (default) ensures queued runs wait instead of
  # cancelling the in-progress run. Combined with the cooldown check, this
  # means rapid merges produce at most 1 real run + 1 queued skip (~10s).
  group: security-full-suite-${{ github.ref }}

jobs:
  # ==========================================================================
  # Job 1: Cooldown check -- prevent stacking during rapid merges
  # ==========================================================================
  cooldown-check:
    name: Cooldown Check
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check cooldown and in-progress runs
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Manual dispatch always runs (bypass all checks)
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Bypass cooldown: manual dispatch"
            exit 0
          fi

          # Check if another run is already in progress (besides this one)
          # GitHub concurrency queues at most 1 pending, but the cooldown
          # check is the primary rate limiter.
          COOLDOWN_HOURS=2
          LAST_SUCCESS=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/security-full-suite.yml/runs?status=success&per_page=1" \
            --jq '.workflow_runs[0].updated_at' 2>/dev/null || echo "")

          if [ -z "$LAST_SUCCESS" ] || [ "$LAST_SUCCESS" = "null" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "No previous successful run found -- running"
            exit 0
          fi

          LAST_EPOCH=$(date -d "$LAST_SUCCESS" +%s 2>/dev/null || echo 0)
          NOW_EPOCH=$(date +%s)
          DIFF_HOURS=$(( (NOW_EPOCH - LAST_EPOCH) / 3600 ))

          if [ "$DIFF_HOURS" -lt "$COOLDOWN_HOURS" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Last successful run was ${DIFF_HOURS}h ago (cooldown: ${COOLDOWN_HOURS}h) -- skipping"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Last successful run was ${DIFF_HOURS}h ago -- running"
          fi

  # ==========================================================================
  # Job 2: SAST -- Semgrep on entire codebase (no Docker needed)
  # ==========================================================================
  sast:
    name: SAST (Semgrep)
    needs: cooldown-check
    if: needs.cooldown-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep (all languages)
        id: semgrep
        run: |
          semgrep scan \
            --config p/python \
            --config p/typescript \
            --config p/kotlin \
            --config p/android \
            --config p/owasp-top-ten \
            --config p/secrets \
            --exclude 'node_modules' \
            --exclude '.venv' \
            --exclude '.gradle' \
            --exclude '*.min.js' \
            --exclude 'apps/api/.venv' \
            --sarif --output semgrep-results.sarif \
            --error \
            apps/api/ apps/web/ sidecar/ apps/mobile/ plugins/ scripts/security/
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        if: always() && hashFiles('semgrep-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Upload SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-results
          path: semgrep-results.sarif
          if-no-files-found: ignore
          retention-days: 30

      - name: Evaluate SAST result
        if: always()
        run: |
          if [ "${{ steps.semgrep.outcome }}" = "failure" ]; then
            echo "SAST found security issues"
            exit 1
          fi
          echo "SAST clean"

  # ==========================================================================
  # Job 3: DAST -- Full Docker stack + all security tests
  # ==========================================================================
  dast:
    name: DAST & Penetration Tests
    needs: cooldown-check
    if: needs.cooldown-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install test dependencies
        run: pip install -r scripts/security/requirements.txt

      - name: Install nuclei
        run: |
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@v3.3.7
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Build & start Docker test stack
        env:
          COMPOSE_PROJECT_NAME: glycemicgpt-test
          DOCKER_BUILDKIT: 1
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml up --build -d

      - name: Wait for services to be healthy
        env:
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: |
          API_HEALTHY=false
          echo "Waiting for API health..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
              echo "API healthy after ${i}s"
              API_HEALTHY=true
              break
            fi
            sleep 1
          done
          if [ "$API_HEALTHY" != "true" ]; then
            echo "FATAL: API not healthy after 90s"
            docker compose -f docker-compose.yml -f docker-compose.test.yml logs api --tail=50
            exit 1
          fi

          WEB_HEALTHY=false
          echo "Waiting for Web health..."
          for i in $(seq 1 90); do
            if curl -sf http://localhost:3001 > /dev/null 2>&1; then
              echo "Web healthy after ${i}s"
              WEB_HEALTHY=true
              break
            fi
            sleep 1
          done
          if [ "$WEB_HEALTHY" != "true" ]; then
            echo "FATAL: Web not healthy after 90s"
            docker compose -f docker-compose.yml -f docker-compose.test.yml logs web --tail=50
            exit 1
          fi

      # ---- Custom Security Tests (sequential with Redis flushes) ----

      - name: Run auth flow tests
        id: auth-tests
        env:
          API_URL: http://localhost:8001
          WEB_URL: http://localhost:3001
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: |
          TEST_SECRET_KEY=$(docker compose -f docker-compose.yml -f docker-compose.test.yml exec -T api printenv SECRET_KEY) || {
            echo "FATAL: Could not read SECRET_KEY from API container"
            exit 1
          }
          export TEST_SECRET_KEY
          python scripts/security/test-auth-flows.py

      - name: Reset rate limits
        env:
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml exec -T redis redis-cli FLUSHDB || true

      - name: Run data isolation tests (IDOR)
        id: idor-tests
        env:
          API_URL: http://localhost:8001
          TEST_PASSWORD: ${{ secrets.SECURITY_TEST_PASSWORD }}
        run: python scripts/security/test-data-isolation.py

      - name: Reset rate limits
        env:
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml exec -T redis redis-cli FLUSHDB || true

      - name: Run research security tests (SSRF, rate limiting)
        id: research-tests
        env:
          API_URL: http://localhost:8001
          TEST_PASSWORD: ${{ secrets.SECURITY_TEST_PASSWORD }}
        run: python scripts/security/test-research-security.py

      - name: Reset rate limits
        env:
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml exec -T redis redis-cli FLUSHDB || true

      - name: Run API fuzzer
        id: fuzzer
        env:
          API_URL: http://localhost:8001
          TEST_PASSWORD: ${{ secrets.SECURITY_TEST_PASSWORD }}
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: python scripts/security/fuzz-api.py

      # ---- Nuclei DAST ----

      - name: Reset rate limits
        env:
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml exec -T redis redis-cli FLUSHDB || true

      - name: Run nuclei DAST
        id: nuclei
        env:
          API_URL: http://localhost:8001
          WEB_URL: http://localhost:3001
        run: ./scripts/security/run-dast.sh

      # ---- ZAP Scans (API + Web in parallel) ----

      - name: Reset rate limits
        env:
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml exec -T redis redis-cli FLUSHDB || true

      - name: Setup ZAP authenticated session
        id: zap-setup
        env:
          API_URL: http://localhost:8001
          TEST_PASSWORD: ${{ secrets.SECURITY_TEST_PASSWORD }}
        run: |
          ZAP_EMAIL="zap_$(date +%s)_${RANDOM}@example.com"

          curl -sf -X POST "$API_URL/api/auth/register" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$ZAP_EMAIL\",\"password\":\"$TEST_PASSWORD\"}" > /dev/null

          COOKIE_JAR=$(mktemp)
          curl -sf -c "$COOKIE_JAR" -X POST "$API_URL/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$ZAP_EMAIL\",\"password\":\"$TEST_PASSWORD\"}" > /dev/null

          SESSION=$(awk '/glycemicgpt_session/ {print $NF}' "$COOKIE_JAR")
          CSRF=$(awk '/csrf_token/ {print $NF}' "$COOKIE_JAR")

          curl -sf -X POST "$API_URL/api/disclaimer/acknowledge" \
            -H "X-CSRF-Token: $CSRF" \
            -b "glycemicgpt_session=$SESSION; csrf_token=$CSRF" > /dev/null || true

          echo "ZAP_SESSION=$SESSION" >> "$GITHUB_ENV"
          echo "ZAP_CSRF=$CSRF" >> "$GITHUB_ENV"
          rm -f "$COOKIE_JAR"
          echo "ZAP auth session established"

      # ZAP scans run sequentially to stay within the 7GB RAM limit of
      # standard GitHub runners. Each ZAP container uses ~1.5GB on top of
      # the ~2.5GB Docker Compose stack.

      - name: Run ZAP API active scan
        id: zap-api
        run: |
          mkdir -p scripts/security/results
          chmod 777 scripts/security/results
          docker run --rm --network="host" \
            -v "$(pwd)/scripts/security:/zap/wrk/:rw" \
            -e "ZAP_SESSION=$ZAP_SESSION" \
            -e "ZAP_CSRF=$ZAP_CSRF" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd -autorun /zap/wrk/zap-api-plan.yaml

      - name: Run ZAP Web scan
        id: zap-web
        run: |
          docker run --rm --network="host" \
            -v "$(pwd)/scripts/security:/zap/wrk/:rw" \
            -e "ZAP_SESSION=$ZAP_SESSION" \
            -e "ZAP_CSRF=$ZAP_CSRF" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd -autorun /zap/wrk/zap-web-plan.yaml

      # ---- Cleanup ----

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-results
          path: scripts/security/results/
          if-no-files-found: ignore
          retention-days: 30

      - name: Show container logs on failure
        if: failure()
        env:
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: |
          echo "=== API Logs ==="
          docker compose -f docker-compose.yml -f docker-compose.test.yml logs api --tail=100
          echo ""
          echo "=== Web Logs ==="
          docker compose -f docker-compose.yml -f docker-compose.test.yml logs web --tail=50

      - name: Tear down Docker stack
        if: always()
        env:
          COMPOSE_PROJECT_NAME: glycemicgpt-test
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml down -v --remove-orphans

  # ==========================================================================
  # Job 4: Summary -- gate job (badge target)
  # ==========================================================================
  summary:
    name: Security Full Suite
    runs-on: ubuntu-latest
    needs: [cooldown-check, sast, dast]
    if: always()
    steps:
      - name: Evaluate results
        env:
          COOLDOWN_RESULT: ${{ needs.cooldown-check.result }}
          SHOULD_RUN: ${{ needs.cooldown-check.outputs.should_run }}
          SAST_RESULT: ${{ needs.sast.result }}
          DAST_RESULT: ${{ needs.dast.result }}
        run: |
          if [ "$COOLDOWN_RESULT" != "success" ]; then
            echo "Cooldown check failed (result: $COOLDOWN_RESULT)"
            exit 1
          fi

          # Cooldown skip: everything is fine, badge stays green
          if [ "$SHOULD_RUN" != "true" ]; then
            echo "Skipped -- within cooldown window. Badge stays green."
            exit 0
          fi

          # Both SAST and DAST must pass
          if [ "$SAST_RESULT" = "success" ] && [ "$DAST_RESULT" = "success" ]; then
            echo "All security tests passed"
            exit 0
          fi

          echo "Security tests failed (SAST: $SAST_RESULT, DAST: $DAST_RESULT)"
          exit 1
