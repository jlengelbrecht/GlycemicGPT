name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: glycemicgpt
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: glycemicgpt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://glycemicgpt:testpassword@localhost:5432/glycemicgpt_test
        run: uv run alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://glycemicgpt:testpassword@localhost:5432/glycemicgpt_test
          TESTING: "true"
          JWT_SECRET_KEY: test-secret-key-for-ci
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0zMi1ieXRlcw==
        run: uv run pytest --tb=short -q

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  lint-backend:
    name: Backend Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

  lint-frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  check-attribution:
    name: Attribution Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for AI attribution in commits, code, and PR description
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_REF: ${{ github.event.pull_request.base.ref || github.ref_name }}
        run: |
          FAILED=false

          # Ensure the base ref is available for git log range queries
          git fetch origin "$BASE_REF" --depth=1 2>/dev/null || true

          # --- AI tool names (case-insensitive matching) ---
          AI_TOOLS="claude|anthropic|copilot|chatgpt|openai|cursor|windsurf|codeium|codewhisperer|amazon.q|gemini|gemini.code.assist|jetbrains.ai|tabnine|sourcegraph|cody|devin|aider|codex"
          TRAILER_CATCHALL="\\[bot\\]|noreply@"
          TRAILER_PATTERN="^Co-Authored-By:.*(${AI_TOOLS}|${TRAILER_CATCHALL})"
          ALT_TRAILER_PATTERN="^(Authored-By|Generated-By|AI-Generated-By):"

          # --- Layer 1: Commit message trailers ---
          echo "=== Layer 1: Checking commit message trailers ==="
          TRAILER_FOUND=false
          while IFS= read -r hash rest; do
            MSG=$(git log -1 --format="%B" "$hash" 2>/dev/null)
            if echo "$MSG" | grep -qiE "$TRAILER_PATTERN"; then
              echo "  ERROR: AI Co-Authored-By in $hash $rest"
              TRAILER_FOUND=true
            fi
            if echo "$MSG" | grep -qiE "$ALT_TRAILER_PATTERN"; then
              echo "  ERROR: AI attribution trailer in $hash $rest"
              TRAILER_FOUND=true
            fi
          done < <(git log --format="%h %s" "origin/${BASE_REF}..HEAD" 2>/dev/null || true)
          if [ "$TRAILER_FOUND" = "true" ]; then
            echo ""
            echo "  Fix: Install the commit-msg hook to strip these automatically:"
            echo "    cp scripts/hooks/commit-msg .git/hooks/commit-msg && chmod +x .git/hooks/commit-msg"
            FAILED=true
          else
            echo "  OK: No prohibited trailers found."
          fi
          echo ""

          # --- Layer 2: Code comments in changed files ---
          echo "=== Layer 2: Checking code comments in changed files ==="
          COMMENT_PHRASES="generated by|generated with|written by|created by|built with|copilot suggestion|ai-generated|ai generated"
          COMMENT_TOOLS="claude|copilot|chatgpt|openai|cursor|gemini|ai|gpt"
          DIFF_OUTPUT=$(git diff "origin/${BASE_REF}...HEAD" -- '*.py' '*.ts' '*.tsx' '*.js' '*.jsx' '*.kt' '*.java' '*.sh' 2>/dev/null || true)
          CODE_HITS=$(echo "$DIFF_OUTPUT" \
            | grep '^+' | grep -v '^+++' \
            | grep -inE "(${COMMENT_PHRASES}).*(${COMMENT_TOOLS})" || true)
          if [ -n "$CODE_HITS" ]; then
            echo "  ERROR: AI attribution comments found in changed files:"
            echo "$CODE_HITS" | head -10
            FAILED=true
          else
            echo "  OK: No AI attribution comments found."
          fi
          echo ""

          # --- Layer 3: PR description ---
          echo "=== Layer 3: Checking PR description ==="
          if [ -n "$PR_BODY" ]; then
            PR_PATTERN="generated with claude code|generated with.*copilot|built with.*ai|claude\\.ai/claude-code|\\bgenerated by (claude|chatgpt|copilot|openai|cursor|gemini|ai)"
            if echo "$PR_BODY" | grep -qiE "$PR_PATTERN"; then
              echo "  ERROR: AI tool branding found in PR description."
              echo "  Remove AI attribution banners, promotional links, and tool branding."
              FAILED=true
            else
              echo "  OK: No AI branding in PR description."
            fi
          else
            echo "  OK: No PR body to check (push event)."
          fi
          echo ""

          # --- Result ---
          if [ "$FAILED" = "true" ]; then
            echo "FAILED: AI attribution detected. See CONTRIBUTING.md for our attribution policy."
            exit 1
          fi
          echo "PASSED: No AI attribution found across commits, code, and PR description."

  test-sidecar:
    name: Sidecar Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sidecar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: sidecar/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
