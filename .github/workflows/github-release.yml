name: GitHub Release from Changelog

# Creates a dated GitHub Release from the latest changelog section
# after the changelog PR merges to main.

on:
  push:
    branches: [main]

permissions: {}

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # Only run for changelog commits (not promotions or release-please)
    if: contains(github.event.head_commit.message, '[Changelog] Update CHANGELOG.md')
    steps:
      - name: Generate token for glycemicgpt-release
        id: release-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract latest changelog section
        id: extract
        run: |
          # Find the first ## YYYY-MM-DD header and extract everything until the next ## or cutoff marker
          SECTION=$(sed -n '/^## [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}/,/^\(## [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}\|<!-- changelog-cutoff:\)/{
            /^## [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}/!{
              /^\(## [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}\|<!-- changelog-cutoff:\)/!p
            }
          }' CHANGELOG.md)

          # Extract the date from the first header
          DATE=$(grep -m1 '^## [0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}' CHANGELOG.md | sed 's/^## //')

          if [ -z "$SECTION" ] || [ -z "$DATE" ]; then
            echo "No changelog section found to release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Truncate to 5000 chars if needed
          if [ ${#SECTION} -gt 5000 ]; then
            SECTION="${SECTION:0:4950}..."
          fi

          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

          # Write section to temp file for gh release
          echo "$SECTION" > /tmp/release-body.md

      - name: Create GitHub Release
        if: steps.extract.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
          RELEASE_DATE: ${{ steps.extract.outputs.date }}
        run: |
          TAG="changelog-${RELEASE_DATE}"

          # Check if release already exists
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $TAG already exists, updating..."
            gh release edit "$TAG" \
              --repo "${{ github.repository }}" \
              --title "Changelog ${RELEASE_DATE}" \
              --notes-file /tmp/release-body.md
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "Changelog ${RELEASE_DATE}" \
              --notes-file /tmp/release-body.md \
              --latest=false
          fi

          echo "Release created: $TAG"
